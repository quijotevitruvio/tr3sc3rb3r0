<script>(function(){try{var t=localStorage.getItem('t3-theme');if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #080809;
    --bg2: #0d0d0f;
    --bg3: #111115;
    --w: #fff;
    --dim: rgba(255, 255, 255, .45);
    --dimmer: rgba(255, 255, 255, .12);
    --border: rgba(255, 255, 255, .07);
    --fd: 'Bebas Neue', sans-serif;
    --fb: 'Space Grotesk', sans-serif;
    --a: #00C8FF;
    --ag: rgba(0, 200, 255, .12);
    --ab: rgba(0, 200, 255, .3);
    --ink: #000;
    --surf-1: rgba(255, 255, 255, .03);
    --line-2: rgba(255, 255, 255, .18);
    --glass-solid: rgba(13, 13, 15, .7);
    --shadow: rgba(0, 0, 0, .5);
    --grid-line: rgba(255, 255, 255, .015);
    --card-inset: rgba(255, 255, 255, .05);
  }
  :root[data-theme="light"] {
    --bg: #f6f6f4;
    --bg2: #ffffff;
    --bg3: #ececea;
    --w: #101014;
    --dim: rgba(16, 16, 20, .64);
    --dimmer: rgba(16, 16, 20, .34);
    --border: rgba(16, 16, 20, .12);
    --a: #0a82a6;
    --ag: rgba(10, 130, 166, .12);
    --ab: rgba(10, 130, 166, .3);
    --ink: #fff;
    --surf-1: rgba(16, 16, 20, .03);
    --line-2: rgba(16, 16, 20, .18);
    --glass-solid: rgba(255, 255, 255, .94);
    --shadow: rgba(0, 0, 0, .16);
    --grid-line: rgba(16, 16, 20, .04);
    --card-inset: rgba(16, 16, 20, .05);
  }
  .theme-btn {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    width: 38px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    border-radius: 4px;
    transition: border-color .2s, color .2s, transform .2s;
  }
  .theme-btn:hover { border-color: var(--a); color: var(--a); transform: translateY(-2px); }
  .theme-btn .ti { pointer-events: none; }
  .theme-btn .ti-sun { display: inline; }
  .theme-btn .ti-moon { display: none; }
  :root[data-theme="light"] .theme-btn .ti-sun { display: none; }
  :root[data-theme="light"] .theme-btn .ti-moon { display: inline; }
  body {
    background: var(--bg);
    color: var(--w);
    font-family: var(--fb);
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Glowing background grid & radial gradients */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: center;
    z-index: 1;
  }
  body::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--ag) 0%, transparent 70%);
    z-index: 1;
    pointer-events: none;
  }
  
  .card-container {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 480px;
    width: 90%;
    padding: 3rem 2rem;
    background: var(--glass-solid);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px var(--shadow), inset 0 1px 0 var(--card-inset);
    animation: floatCard 6s ease-in-out infinite;
  }
  
  @keyframes floatCard {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  
  .head-deco {
    width: 80px;
    height: 80px;
    margin: 0 auto 1.5rem;
    opacity: 0.85;
    animation: pulseGlow 3s ease-in-out infinite;
  }
  
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.7; transform: scale(1); filter: drop-shadow(0 0 5px var(--ag)); }
    50% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 15px var(--ab)); }
  }
  
  h1 {
    font-family: var(--fd);
    font-size: 7rem;
    line-height: 1;
    letter-spacing: 0.05em;
    color: var(--a);
    text-shadow: 0 0 30px var(--ab);
    margin-bottom: 0.5rem;
  }
  
  h2 {
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 1rem;
    color: var(--w);
  }
  
  p {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--dim);
    margin-bottom: 2rem;
  }
  
  .actions {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  
  .btn-primary {
    background: var(--a);
    border: 1px solid var(--a);
    color: var(--ink);
    font-family: var(--fb);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    border-radius: 4px;
    text-decoration: none;
    transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s;
    display: block;
    box-shadow: 0 4px 15px rgba(0, 200, 255, 0.2);
  }
  
  .btn-primary:hover {
    background: transparent;
    color: var(--a);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0, 200, 255, 0.1);
  }
  
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--fb);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.9rem 2rem;
    border-radius: 4px;
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
    display: block;
  }
  
  .btn-secondary:hover {
    border-color: var(--dim);
    color: var(--w);
    background: var(--surf-1);
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<button class="theme-btn" id="themeToggle" type="button" aria-label="Cambiar tema" title="Cambiar tema"><span class="ti ti-sun" aria-hidden="true">☀</span><span class="ti ti-moon" aria-hidden="true">☾</span></button>

<div class="card-container">
  <!-- Glowing 3 logo decoration -->
  <svg class="head-deco" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <rect width="32" height="32" fill="none"/>
    <text x="16" y="27" font-size="28" font-family="Arial Black, sans-serif" font-weight="900" fill="#00C8FF" text-anchor="middle">3</text>
  </svg>
  
  <h1>404</h1>
  
  <h2 id="error-title">Portal Inexistente</h2>
  <p id="error-desc">Parece que te has salido del mapa digital. El portal que buscas no está en nuestros servidores o ha sido trasladado.</p>
  
  <div class="actions">
    <a href="/" class="btn-primary" id="btn-home">Volver al Portal Principal</a>
    <a href="https://wa.me/573003000958?text=Hola%20Tr3sC3rb3r0%2C%20tuve%20un%20problema%20en%20el%20sitio%20web..." class="btn-secondary" id="btn-wa" target="_blank" rel="noopener">Contactar por WhatsApp</a>
  </div>
</div>

<script>
  // Dynamic language localization mapping
  const D = {
    es: {
      title: "Portal Inexistente",
      desc: "Parece que te has salido del mapa digital. El portal que buscas no está en nuestros servidores o ha sido trasladado.",
      home: "Volver al Portal Principal",
      wa: "Contactar por WhatsApp"
    },
    en: {
      title: "Page Not Found",
      desc: "It seems you've wandered off the digital map. The portal you are looking for does not exist on our servers or has been moved.",
      home: "Back to Home Portal",
      wa: "Contact via WhatsApp"
    }
  };

  // Get active language from localStorage, falling back to browser language or 'es'
  let lang = 'es';
  try {
    const saved = localStorage.getItem('lang');
    if (saved === 'es' || saved === 'en') {
      lang = saved;
    } else {
      const browserLang = navigator.language || navigator.userLanguage;
      if (browserLang && browserLang.startsWith('en')) {
        lang = 'en';
      }
    }
  } catch(e) {}

  // Update elements
  document.getElementById('error-title').textContent = D[lang].title;
  document.getElementById('error-desc').textContent = D[lang].desc;
  document.getElementById('btn-home').textContent = D[lang].home;
  document.getElementById('btn-wa').textContent = D[lang].wa;
  document.documentElement.lang = lang;
</script>

<script>(function(){var b=document.getElementById('themeToggle');if(!b)return;b.addEventListener('click',function(){var r=document.documentElement,n=r.getAttribute('data-theme')==='light'?'dark':'light';r.setAttribute('data-theme',n);try{localStorage.setItem('t3-theme',n);}catch(e){}});})();</script>

</body>
</html>
