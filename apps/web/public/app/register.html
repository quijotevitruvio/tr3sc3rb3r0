<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Crear cuenta · Tr3sC3rb3r0</title>
<link rel="stylesheet" href="/app/assets/app.css?v=1.0.3">
</head>
<body class="auth">
<main class="auth-card">
  <a href="/" class="auth-brand"><span>Tr3s</span>C3rb3r0</a>
  <h1>Crear cuenta</h1>
  <p class="auth-sub">Empezás en plan <strong>Básico</strong> (69.000 COP/mes). Subís a Pro o Max cuando quieras.</p>
  <form id="registerForm" novalidate>
    <label>
      <span>Tu email</span>
      <input type="email" name="email" autocomplete="email" required>
    </label>
    <label>
      <span>Tu nombre <small>(opcional)</small></span>
      <input type="text" name="displayName" autocomplete="name" maxlength="100">
    </label>
    <label>
      <span>Nombre de tu organización</span>
      <input type="text" name="orgName" autocomplete="organization" maxlength="150" required>
      <small class="auth-hint">Aparece en tu CRM, facturas y URL. Lo podés cambiar después.</small>
    </label>
    <label>
      <span>Contraseña</span>
      <input type="password" name="password" autocomplete="new-password" minlength="8" required>
      <small class="auth-hint">Mínimo 8 caracteres, 1 letra y 1 número.</small>
    </label>
    <button type="submit" class="auth-cta">Crear mi cuenta</button>
    <div class="auth-error" id="registerErr" hidden></div>
  </form>
  <p class="auth-alt">¿Ya tenés cuenta? <a href="/app/login.html">Iniciar sesión</a></p>
  <p class="auth-legal">Al crear tu cuenta aceptás los <a href="/legal/terminos.html">Términos</a> y la <a href="/legal/privacidad.html">Política de Privacidad</a> (Ley 1581 Habeas Data).</p>
</main>
<script src="/app/assets/app.js?v=1.0.3" defer></script>
</body>
</html>
