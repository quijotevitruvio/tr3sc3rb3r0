<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- Theme bootstrap (anti-FOUC): aplica data-theme antes del primer paint -->
<script>(function(){try{var t=localStorage.getItem('t3-theme');if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta name="robots" content="noindex,nofollow">
<title>Iniciar sesión · Tr3sC3rb3r0</title>
<link rel="stylesheet" href="/app/assets/app.css?v=1.1.1">
</head>
<body class="auth">
<button class="theme-btn theme-btn-fixed" id="themeToggle" type="button" aria-label="Cambiar tema" title="Cambiar tema"><span class="ti ti-sun" aria-hidden="true">☀</span><span class="ti ti-moon" aria-hidden="true">☾</span></button>
<main class="auth-card">
  <a href="/" class="auth-brand"><span>Tr3s</span>C3rb3r0</a>
  <h1>Iniciar sesión</h1>
  <p class="auth-sub">Bienvenido de vuelta.</p>
  <form id="loginForm" novalidate>
    <label>
      <span>Email</span>
      <input type="email" name="email" autocomplete="email" required>
    </label>
    <label>
      <span>Contraseña</span>
      <input type="password" name="password" autocomplete="current-password" minlength="8" required>
    </label>
    <button type="submit" class="auth-cta">Entrar</button>
    <div class="auth-error" id="loginErr" hidden></div>
  </form>
  <p class="auth-alt">¿No tenés cuenta? <a href="/app/register.html">Crear una</a></p>
  <p class="auth-alt"><a href="/app/forgot.html">Olvidé mi contraseña</a></p>
</main>
<script src="/app/assets/app.js?v=1.1.0" defer></script>
<!-- Toggle de tema (key 't3-theme' compartida con la landing) -->
<script>(function(){var r=document.documentElement,K='t3-theme',b=document.getElementById('themeToggle');function set(t,p){r.setAttribute('data-theme',t==='light'?'light':'dark');if(p){try{localStorage.setItem(K,t);}catch(e){}}if(b)b.setAttribute('aria-pressed',String(t==='light'));}set(r.getAttribute('data-theme')==='light'?'light':'dark',false);if(b)b.addEventListener('click',function(){set(r.getAttribute('data-theme')==='light'?'dark':'light',true);});var mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)');if(mq&&mq.addEventListener)mq.addEventListener('change',function(e){var s;try{s=localStorage.getItem(K);}catch(_){}if(s!=='light'&&s!=='dark')set(e.matches?'light':'dark',false);});})();</script>
</body>
</html>
